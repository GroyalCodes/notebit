# NoteBit on Fly.io.
# Model: one Fly app = one workspace instance (instance-per-tenant).
# First deploy:  fly launch --no-deploy   (creates app + volume)  then  fly deploy --remote-only
app = "notebit-cloud"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8200"
  HOST = "0.0.0.0"
  WIKI_DB = "/data/notebit.db"

[http_service]
  internal_port = 8200
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

# Persistent SQLite lives on a volume (one per app).
[[mounts]]
  source = "notebit_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
